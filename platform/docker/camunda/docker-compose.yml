# Camunda 8 — Lightweight Self-Managed (Orchestration + ES + Connectors)
# Based on official camunda/camunda-distributions docker-compose 8.8
# Docs: https://docs.camunda.io/docs/self-managed/setup/deploy/local/docker-compose/
#
# Endpoints:
#   REST API:  https://camunda.regendevcorp.com/v2/
#   Operate:   https://camunda.regendevcorp.com/operate
#   Tasklist:  https://camunda.regendevcorp.com/tasklist
#   gRPC:      port 26500 (internal only)
#   Login:     demo / demo

services:
  orchestration:
    image: camunda/camunda:latest
    container_name: orchestration
    ports:
      - "8080:8080"
      - "26500:26500"
      - "9600:9600"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && echo -e \"GET /actuator/health/status HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && head -n 1 <&3'"]
      interval: 15s
      retries: 30
      start_period: 60s
    environment:
      - JAVA_TOOL_OPTIONS=-Xms512m -Xmx1024m
    volumes:
      - zeebe-data:/usr/local/zeebe/data
    configs:
      - source: orchestration-config
        target: /usr/local/camunda/config/application.yaml
    depends_on:
      elasticsearch:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.4
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - cluster.routing.allocation.disk.threshold_enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cat/health | grep -q green"]
      interval: 15s
      retries: 30
      start_period: 30s
      timeout: 5s
    volumes:
      - elastic-data:/usr/share/elasticsearch/data

  connectors:
    image: camunda/connectors-bundle:latest
    container_name: connectors
    ports:
      - "8086:8080"
    environment:
      - management.endpoints.web.exposure.include=health,configprops
      - management.endpoint.health.probes.enabled=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health/readiness"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    configs:
      - source: connectors-config
        target: application.yaml
    depends_on:
      orchestration:
        condition: service_healthy

volumes:
  zeebe-data:
  elastic-data:

configs:
  connectors-config:
    content: |
      camunda:
        client:
          mode: self-managed
          grpc-address: http://orchestration:26500
          rest-address: http://orchestration:8080
        connectors:
          secretprovider:
            environment:
              prefix: "CONNECTORS_SECRET"

  orchestration-config:
    content: |
      camunda:
        system:
          cpu-thread-count: "3"
          io-thread-count: "3"
        security:
          authentication:
            method: "basic"
            unprotectedApi: true
          authorizations:
            enabled: false
          initialization:
            users:
              - username: "demo"
                password: "demo"
                name: "Demo User"
                email: "demo@demo.com"
            defaultRoles.admin.users:
              - "demo"
        database.index.numberOfReplicas: 0
        data:
          secondary-storage:
            type: elasticsearch
            elasticsearch:
              cluster-name: elasticsearch
              url: "http://elasticsearch:9200"
